<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pinball Quick Strike</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 10px; background: #121212; color: #eee; }
        button { padding: 8px 15px; margin: 5px; background: #2E7D32; border: none; color: white; border-radius: 4px; cursor: pointer; }
        button:hover { background: #388E3C; }
        input { width: calc(100% - 20px); padding: 8px; margin: 5px 0; background: #1e1e1e; border: 1px solid #444; color: white; border-radius: 4px; }
        #chat { border: 1px solid #333; min-height: 150px; padding: 10px; margin: 10px 0; background: #1a1a1a; overflow-y: auto; }
        #status { color: #888; }
        .link-box { word-break: break-all; background: #1e1e1e; padding: 10px; border: 1px solid #444; margin: 10px 0; }
    </style>
</head>
<body>
    <h3>⚡ Быстрая стрела (автоматическая)</h3>
    <div>
        <button id="createBtn">Создать стрелу</button>
        <div id="offerLink" class="link-box" style="display:none;"></div>
    </div>
    <div>
        <button id="acceptBtn" style="display:none;">Принять стрелу</button>
    </div>
    <div id="chat"></div>
    <div>
        <input type="text" id="messageInput" placeholder="Введи сообщение после соединения" disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
    <div id="status">Ожидание действий...</div>

<script>
const SIGNALING = 'https://pinball-signal.stephanclaps.workers.dev';
const statusDiv = document.getElementById('status');
const chatDiv = document.getElementById('chat');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const createBtn = document.getElementById('createBtn');
const acceptBtn = document.getElementById('acceptBtn');
const offerLink = document.getElementById('offerLink');

let peerConnection;
let dataChannel;
let sessionId;

async function createOffer() {
    createBtn.disabled = true;
    peerConnection = new RTCPeerConnection();
    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel(dataChannel);
    
    // Собираем ICE-кандидаты и отправляем на сервер
    peerConnection.onicecandidate = e => {
        if (e.candidate) {
            fetch(SIGNALING + '/ice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: sessionId, candidate: e.candidate })
            });
        }
    };
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    const res = await fetch(SIGNALING + '/offer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sdp: peerConnection.localDescription })
    });
    const data = await res.json();
    sessionId = data.id;
    
    const link = window.location.href + '?id=' + sessionId;
    offerLink.style.display = 'block';
    offerLink.innerHTML = `<strong>Отправь эту ссылку другу:</strong><br>${link}`;
    statusDiv.textContent = 'Ожидание ответа...';
    
    // Получаем answer и ICE-кандидаты от принимающего
    pollForAnswerAndIce();
}

async function pollForAnswerAndIce() {
    const check = async () => {
        // Получаем answer
        const answerRes = await fetch(SIGNALING + '/answer?id=' + sessionId);
        if (answerRes.ok) {
            const data = await answerRes.json();
            if (!peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(data.sdp);
            }
        }
        // Получаем ICE-кандидаты от принимающего
        const iceRes = await fetch(SIGNALING + '/ice?id=' + sessionId);
        if (iceRes.ok) {
            const candidates = await iceRes.json();
            for (const c of candidates) {
                try {
                    await peerConnection.addIceCandidate(c);
                } catch(e) {}
            }
        }
    };
    const interval = setInterval(check, 2000);
    check();
}

function setupDataChannel(channel) {
    channel.onopen = () => {
        statusDiv.textContent = '✅ Канал открыт! Можно общаться.';
        messageInput.disabled = false;
        sendBtn.disabled = false;
    };
    channel.onmessage = (e) => {
        const msg = document.createElement('div');
        msg.textContent = `📩 Друг: ${e.data}`;
        chatDiv.appendChild(msg);
    };
}

async function acceptOffer() {
    const params = new URLSearchParams(window.location.search);
    sessionId = params.get('id');
    if (!sessionId) return;
    
    acceptBtn.style.display = 'none';
    
    const res = await fetch(SIGNALING + '/offer?id=' + sessionId);
    if (!res.ok) { statusDiv.textContent = 'Стрела не найдена или истекла.'; return; }
    const data = await res.json();
    
    peerConnection = new RTCPeerConnection();
    peerConnection.ondatachannel = (e) => {
        dataChannel = e.channel;
        setupDataChannel(dataChannel);
    };
    
    // Собираем ICE-кандидаты и отправляем на сервер
    peerConnection.onicecandidate = e => {
        if (e.candidate) {
            fetch(SIGNALING + '/ice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: sessionId, candidate: e.candidate })
            });
        }
    };
    
    await peerConnection.setRemoteDescription(data.sdp);
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    // Отправляем answer
    await fetch(SIGNALING + '/answer', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: sessionId, sdp: peerConnection.localDescription })
    });
    
    // Получаем ICE-кандидаты от инициатора
    pollForIce();
}

async function pollForIce() {
    const check = async () => {
        const res = await fetch(SIGNALING + '/ice?id=' + sessionId);
        if (res.ok) {
            const candidates = await res.json();
            for (const c of candidates) {
                try {
                    await peerConnection.addIceCandidate(c);
                } catch(e) {}
            }
        }
    };
    setInterval(check, 2000);
    check();
}

function sendMessage() {
    if (dataChannel && dataChannel.readyState === 'open') {
        const text = messageInput.value.trim();
        if (text) {
            dataChannel.send(text);
            const msg = document.createElement('div');
            msg.textContent = `📤 Я: ${text}`;
            chatDiv.appendChild(msg);
            messageInput.value = '';
        }
    }
}

createBtn.addEventListener('click', createOffer);
sendBtn.addEventListener('click', sendMessage);

if (window.location.search.includes('id=')) {
    acceptBtn.style.display = 'block';
    statusDiv.textContent = 'Нажми "Принять стрелу" для подключения.';
    acceptBtn.addEventListener('click', acceptOffer);
}
</script>
</body>
</html>
