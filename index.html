<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h3>P2PPong</h3>
    <div id="status"></div>
</div>

<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const statusDiv = document.getElementById('status');

let pc, dc, sid, handshakeSecret, sessionSecret, creatorToken, receiverToken;

const MY_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);

function generateToken() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2);
}

async function apiCall(method, path, body = null) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 80000);
    try {
        const options = { method, headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(RENDER_SERVER + path, options);
        clearTimeout(to);
        if (res.ok) return await res.json();
        return null;
    } catch(e) { clearTimeout(to); return null; }
}

function sendToParent(msg) {
    if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*');
}

function setupDataChannel(channel) {
    channel.onopen = () => { statusDiv.textContent = 'Канал открыт'; };
    channel.onmessage = (e) => {
        let text = e.data;
        if (sessionSecret) {
            try { text = decrypt(text, sessionSecret); } catch(err) {}
        }
        sendToParent({ type: 'message', text: text, sender: 'Друг' });
    };
}

function encrypt(text, key) {
    return btoa(text.split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))).join(''));
}

function decrypt(text, key) {
    return atob(text).split('').map((c, i) => String.fromCharCode(c.charCodeAt(0) ^ key.charCodeAt(i % key.length))).join('');
}

async function waitForIceComplete(pc) {
    return new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') resolve();
        else pc.addEventListener('icegatheringstatechange', () => {
            if (pc.iceGatheringState === 'complete') resolve();
        });
    });
}

async function checkRender() {
    statusDiv.textContent = 'Проверка сервера...';
    const ping = await apiCall('GET', '/ping');
    if (ping) {
        handshakeSecret = generateToken();
        sessionSecret = null;
        statusDiv.textContent = 'Готов';
        sendToParent({ type: 'pong-ready', handshake: handshakeSecret });
    } else {
        statusDiv.textContent = 'Сервер не отвечает';
        setTimeout(checkRender, 5000);
    }
}

async function createSession() {
    statusDiv.textContent = 'Создание сессии...';
    
    const res = await apiCall('POST', '/session', { creatorId: MY_ID });
    if (!res || !res.token) {
        sendToParent({ type: 'error', text: 'Сервер не отвечает' });
        return;
    }
    
    sid = res.sessionId;
    creatorToken = res.token;
    
    sendToParent({ type: 'session-created', sessionId: sid });
    sendToParent({ type: 'status', text: 'Ожидаю получателя...' });
    
    let joined = false;
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const check = await apiCall('GET', `/session?id=${sid}&token=${creatorToken}`);
        if (check && check.receiverReady) {
            joined = true;
            break;
        }
        await new Promise(r => setTimeout(r, 2000));
    }
    
    if (!joined) {
        sendToParent({ type: 'error', text: 'Таймаут ожидания' });
        return;
    }
    
    const verifyRes = await apiCall('POST', '/verify', {
        sessionId: sid,
        token: creatorToken,
        receiverId: 'confirmed'
    });
    
    if (!verifyRes || verifyRes.status !== 'verified') {
        sendToParent({ type: 'error', text: 'Ошибка верификации' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Создание канала...' });
    
    pc = new RTCPeerConnection();
    dc = pc.createDataChannel('chat');
    setupDataChannel(dc);
    
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await waitForIceComplete(pc);
    
    await apiCall('POST', '/offer', { sessionId: sid, token: creatorToken, sdp: pc.localDescription.sdp });
    
    sendToParent({ type: 'status', text: 'Ожидание ответа...' });
    
    let answerSdp = null;
    const ansStart = Date.now();
    while (Date.now() - ansStart < 90000) {
        const ans = await apiCall('GET', `/answer?id=${sid}&token=${creatorToken}`);
        if (ans && ans.sdp) { answerSdp = ans.sdp; break; }
        await new Promise(r => setTimeout(r, 2000));
    }
    
    if (!answerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут ответа' });
        return;
    }
    
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    
    sessionSecret = generateToken();
    sendToParent({ type: 'channel-open', secret: sessionSecret });
    statusDiv.textContent = 'Канал открыт';
}

async function acceptSession(id) {
    sid = id;
    statusDiv.textContent = 'Подключение...';
    
    const res = await apiCall('POST', '/join', { sessionId: sid, receiverId: MY_ID });
    if (!res || !res.token) {
        sendToParent({ type: 'error', text: 'Не могу подключиться' });
        return;
    }
    
    receiverToken = res.token;
    
    sendToParent({ type: 'status', text: 'Ожидание предложения...' });
    
    let offerSdp = null;
    const offStart = Date.now();
    while (Date.now() - offStart < 90000) {
        const off = await apiCall('GET', `/offer?id=${sid}&token=${receiverToken}`);
        if (off && off.sdp) { offerSdp = off.sdp; break; }
        await new Promise(r => setTimeout(r, 2000));
    }
    
    if (!offerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут предложения' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Создание ответа...' });
    
    pc = new RTCPeerConnection();
    pc.ondatachannel = (e) => {
        dc = e.channel;
        setupDataChannel(dc);
    };
    
    await pc.setRemoteDescription({ type: 'offer', sdp: offerSdp });
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await waitForIceComplete(pc);
    
    await apiCall('POST', '/answer', { sessionId: sid, token: receiverToken, sdp: pc.localDescription.sdp });
    
    sendToParent({ type: 'status', text: 'Ожидание открытия канала...' });
}

window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.action) return;
    
    if (data.action !== 'handshake' && data.action !== 'ping') {
        if (!data.secret || data.secret !== sessionSecret) {
            sendToParent({ type: 'error', text: 'Неверный секрет' });
            return;
        }
    }
    
    switch(data.action) {
        case 'handshake':
            if (data.handshake === handshakeSecret) {
                handshakeSecret = null;
                sendToParent({ type: 'handshake-ok' });
            }
            break;
        case 'create':
            createSession();
            break;
        case 'accept':
            acceptSession(data.id);
            break;
        case 'send':
            if (dc && dc.readyState === 'open') {
                let text = data.text;
                if (sessionSecret) text = encrypt(text, sessionSecret);
                dc.send(text);
            }
            break;
    }
});

checkRender();
</script>
</body>
</html>
