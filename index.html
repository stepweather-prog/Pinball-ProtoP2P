<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2PPong — просто стрела</title>
    <style>
        body { background: #0a0a0a; color: #eee; font-family: monospace; padding: 20px; max-width: 700px; margin: 0 auto; }
        button, input, textarea { background: #1e1e1e; border: 1px solid #444; color: #eee; padding: 10px; border-radius: 8px; font-size: 16px; }
        button { background: #2c5e2c; cursor: pointer; }
        button:hover { background: #1e4a1e; }
        .box { border: 1px solid #444; padding: 15px; margin: 15px 0; border-radius: 12px; background: #111; }
        #chat { border: 1px solid #333; min-height: 150px; padding: 10px; margin: 10px 0; overflow-y: auto; background: #0f0f0f; }
        .link { word-break: break-all; background: #1a2a1a; padding: 10px; border-radius: 8px; font-size: 14px; }
        hr { border-color: #333; }
    </style>
</head>
<body>
<h2>🏹 P2PPong — стрела без сервера</h2>
<p style="color:#aaa;">Временные хранилища: 0x0.st, ix.io, paste.rs, file.io, transfer.sh</p>

<div class="box">
    <button id="createBtn">🎯 Создать стрелу</button>
    <div id="offerLink" class="link" style="display:none; margin-top:12px;"></div>
</div>

<div id="acceptSection" class="box" style="display:none;">
    <input type="text" id="uuidInput" placeholder="Вставьте ID стрелы (например, abc123)" style="width:100%;">
    <button id="acceptBtn">🔗 Принять стрелу</button>
</div>

<div id="chat" style="display:none;"></div>
<div>
    <input type="text" id="messageInput" placeholder="Сообщение" disabled style="width:70%;">
    <button id="sendBtn" disabled>Отправить</button>
</div>
<div id="status" style="color:#aaa; margin-top:10px;">⚡ Готов. Нажми «Создать стрелу».</div>

<script>
    // ========== 1. ПРОСТЫЕ ВРЕМЕННЫЕ ХРАНИЛИЩА (без обучения) ==========
    const STORAGES = [
        { name: "0x0.st", url: "https://0x0.st", upload: true, download: true },
        { name: "ix.io", url: "https://ix.io", upload: true, download: true },
        { name: "paste.rs", url: "https://paste.rs", upload: true, download: true },
        { name: "file.io", url: "https://file.io", upload: true, download: true },
        { name: "transfer.sh", url: "https://transfer.sh", upload: true, download: true }
    ];

    // Загрузить текст на ВСЕ хранилища параллельно, вернуть первый успешный URL файла
    async function uploadToAny(filename, content) {
        const uploadPromises = STORAGES.map(async (store) => {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 3000);
                const formData = new FormData();
                formData.append("file", new Blob([content], {type: "text/plain"}), filename);
                const res = await fetch(store.url, {
                    method: "POST",
                    body: formData,
                    signal: controller.signal,
                    mode: "cors"
                });
                clearTimeout(timeout);
                if (res.ok) {
                    let fileUrl = await res.text();
                    fileUrl = fileUrl.trim();
                    if (!fileUrl.startsWith("http")) {
                        if (store.url.endsWith("/")) fileUrl = store.url + fileUrl;
                        else fileUrl = store.url + "/" + fileUrl;
                    }
                    return { store: store.name, fileUrl };
                }
            } catch(e) {}
            return null;
        });
        const results = await Promise.allSettled(uploadPromises);
        for (const r of results) {
            if (r.status === "fulfilled" && r.value) return r.value;
        }
        return null;
    }

    // Скачать текст по URL из любого хранилища (пробуем все, но можно напрямую)
    async function downloadText(url) {
        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 4000);
            const res = await fetch(url, { signal: controller.signal, mode: "cors" });
            clearTimeout(timeout);
            if (res.ok) return await res.text();
        } catch(e) {}
        return null;
    }

    // Поиск файла по ID: пробуем все возможные ссылки для каждого хранилища
    async function findOfferById(uuid) {
        const filename = `p2p_${uuid}.offer.txt`;
        for (const store of STORAGES) {
            const candidateUrl = store.url.endsWith("/") ? store.url + filename : store.url + "/" + filename;
            const content = await downloadText(candidateUrl);
            if (content && content.trim().startsWith("v=")) {
                return { content, sourceUrl: candidateUrl, store: store.name };
            }
        }
        return null;
    }

    // ========== 2. WebRTC логика ==========
    let peerConnection = null;
    let dataChannel = null;
    let currentUUID = null;
    let pollingInterval = null;
    let answerUrl = null;

    const statusDiv = document.getElementById('status');
    const chatDiv = document.getElementById('chat');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const createBtn = document.getElementById('createBtn');
    const acceptBtn = document.getElementById('acceptBtn');
    const uuidInput = document.getElementById('uuidInput');
    const offerLinkDiv = document.getElementById('offerLink');
    const acceptSection = document.getElementById('acceptSection');

    function generateUUID() {
        return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
    }

    function setupDataChannel(channel) {
        channel.onopen = () => {
            statusDiv.innerHTML = '✅ Канал открыт! Можно общаться.';
            messageInput.disabled = false;
            sendBtn.disabled = false;
            chatDiv.style.display = 'block';
        };
        channel.onmessage = (e) => {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = `📩 Собеседник: ${e.data}`;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        };
        channel.onclose = () => {
            statusDiv.innerHTML = '⚠️ Канал закрыт.';
            messageInput.disabled = true;
            sendBtn.disabled = true;
        };
    }

    // === СОЗДАНИЕ СТРЕЛЫ ===
    async function createOffer() {
        createBtn.disabled = true;
        statusDiv.innerHTML = '🔄 Создаём offer, загружаем на хранилища...';
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection();
        dataChannel = peerConnection.createDataChannel('chat');
        setupDataChannel(dataChannel);
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        const sdpOffer = peerConnection.localDescription.sdp;
        const uuid = generateUUID();
        currentUUID = uuid;
        const filename = `p2p_${uuid}.offer.txt`;
        
        // Загружаем offer на все хранилища параллельно, ждём первый успех
        const uploadResult = await uploadToAny(filename, sdpOffer);
        if (!uploadResult) {
            statusDiv.innerHTML = '❌ Не удалось загрузить offer ни в одно хранилище. Попробуйте позже.';
            createBtn.disabled = false;
            return;
        }
        
        // Формируем ссылку с ID
        const fullUrl = `${window.location.href.split('?')[0]}?id=${uuid}`;
        offerLinkDiv.style.display = 'block';
        offerLinkDiv.innerHTML = `<strong>🔗 Стрела создана! Отправьте ссылку другу:</strong><br>
                                  <a href="${fullUrl}" target="_blank" style="color:#8bc34a;">${fullUrl}</a><br>
                                  <small>или передайте ID: <code>${uuid}</code></small>
                                  <button id="copyBtn" style="margin-left:10px; padding:4px 8px;">📋 Копировать ссылку</button>`;
        document.getElementById('copyBtn')?.addEventListener('click', () => {
            navigator.clipboard.writeText(fullUrl);
            statusDiv.innerHTML = '✅ Ссылка скопирована.';
        });
        
        statusDiv.innerHTML = `✅ Offer загружен (${uploadResult.store}). Ожидаем ответа друга... ID: ${uuid}`;
        
        // Polling: ищем файл ответа
        const answerFilename = `p2p_${uuid}.answer.txt`;
        // Пробуем скачать ответ с того же хранилища, куда загрузили offer (заменяем .offer.txt на .answer.txt)
        const answerCandidateUrl = uploadResult.fileUrl.replace(/\.offer\.txt$/, '.answer.txt');
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            const answerSdp = await downloadText(answerCandidateUrl);
            if (answerSdp && answerSdp.trim().startsWith('v=')) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                statusDiv.innerHTML = '📡 Получен SDP answer, устанавливаем соединение...';
                try {
                    await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
                    statusDiv.innerHTML = '✅ Соединение установлено!';
                } catch (err) {
                    statusDiv.innerHTML = `❌ Ошибка: ${err.message}`;
                    createBtn.disabled = false;
                }
                return;
            }
        }, 2000);
        
        // Таймаут 90 секунд
        setTimeout(() => {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                statusDiv.innerHTML = '⏱️ Таймаут: ответ не получен. Попробуйте ещё раз.';
                createBtn.disabled = false;
            }
        }, 90000);
    }
    
    // === ПРИНЯТИЕ СТРЕЛЫ ===
    async function acceptOffer() {
        const uuid = uuidInput.value.trim();
        if (!uuid) {
            statusDiv.innerHTML = '❌ Введите ID стрелы.';
            return;
        }
        acceptBtn.disabled = true;
        statusDiv.innerHTML = `🔍 Ищем offer с ID ${uuid}...`;
        
        const found = await findOfferById(uuid);
        if (!found) {
            statusDiv.innerHTML = '❌ Offer не найден. Проверьте ID или попросите друга создать стрелу заново.';
            acceptBtn.disabled = false;
            return;
        }
        
        statusDiv.innerHTML = `✅ Offer найден (${found.store}). Создаём ответ...`;
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection();
        peerConnection.ondatachannel = (e) => {
            dataChannel = e.channel;
            setupDataChannel(dataChannel);
        };
        
        try {
            await peerConnection.setRemoteDescription({ type: 'offer', sdp: found.content });
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            const answerSdp = peerConnection.localDescription.sdp;
            
            // Загружаем answer на то же хранилище (или на любое другое) с именем p2p_<uuid>.answer.txt
            const answerFilename = `p2p_${uuid}.answer.txt`;
            const uploadResult = await uploadToAny(answerFilename, answerSdp);
            if (uploadResult) {
                statusDiv.innerHTML = `✅ Ответ отправлен через ${uploadResult.store}. Ожидаем открытия канала...`;
            } else {
                statusDiv.innerHTML = '⚠️ Не удалось отправить ответ, но канал может установиться автоматически.';
            }
            // Канал откроется, когда создатель получит answer
        } catch (err) {
            statusDiv.innerHTML = `❌ Ошибка WebRTC: ${err.message}`;
            acceptBtn.disabled = false;
        }
    }
    
    function sendMessage() {
        if (dataChannel && dataChannel.readyState === 'open') {
            const text = messageInput.value.trim();
            if (text) {
                dataChannel.send(text);
                const msgDiv = document.createElement('div');
                msgDiv.textContent = `📤 Я: ${text}`;
                chatDiv.appendChild(msgDiv);
                messageInput.value = '';
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        } else {
            statusDiv.innerHTML = '⚠️ Канал не открыт.';
        }
    }
    
    // === Обработка параметра ?id= в URL ===
    const urlParams = new URLSearchParams(window.location.search);
    const idFromUrl = urlParams.get('id');
    if (idFromUrl) {
        uuidInput.value = idFromUrl;
        acceptSection.style.display = 'block';
        statusDiv.innerHTML = `🔗 ID стрелы: ${idFromUrl}. Нажмите «Принять стрелу».`;
    } else {
        acceptSection.style.display = 'block';
        statusDiv.innerHTML = '⚡ Введите ID стрелы от друга и нажмите «Принять».';
    }
    
    createBtn.addEventListener('click', createOffer);
    acceptBtn.addEventListener('click', acceptOffer);
    sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
