<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong — арбитр</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h3>⚡ P2PPong — арбитр</h3>
    <div id="status">Запуск...</div>
</div>

<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const statusDiv = document.getElementById('status');

let peerConnection;
let dataChannel;
let sessionId;
let myRole = null;
let sessionToken = null; // Токен для Render
let robinToken = null; // Токен для RobinHood

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function generateUUID() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
}

function generateRobinToken() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
}

async function apiCall(method, path, body = null) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 80000);
    try {
        const options = {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            signal: ctrl.signal
        };
        if (body) options.body = JSON.stringify(body);
        
        const res = await fetch(RENDER_SERVER + path, options);
        clearTimeout(to);
        if (res.ok) return await res.json();
        return null;
    } catch(e) {
        clearTimeout(to);
        return null;
    }
}

function sendToParent(msg) {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, '*');
    }
}

// Проверка токена Робина
function validateRobinToken(token) {
    return robinToken && token === robinToken;
}

// ========== ПРОВЕРКА RENDER ==========
async function checkRender() {
    statusDiv.textContent = 'Проверяю сервер...';
    const ping = await apiCall('GET', '/ping');
    if (ping) {
        // Генерируем токен для Робина
        robinToken = generateRobinToken();
        statusDiv.textContent = 'Понг готов';
        sendToParent({ type: 'pong-ready', robinToken: robinToken });
    } else {
        statusDiv.textContent = 'Сервер не отвечает';
        setTimeout(checkRender, 5000);
    }
}

// ========== СОЗДАНИЕ СЕССИИ (личность А) ==========
async function createSession() {
    statusDiv.textContent = 'Создаю сессию...';
    myRole = 'creator';
    
    sessionId = generateUUID();
    
    // Шаг 1: Создаём сессию на Render
    const sessionRes = await apiCall('POST', '/session', { sessionId: sessionId, role: 'creator' });
    if (!sessionRes || !sessionRes.token) {
        sendToParent({ type: 'error', text: 'Сервер не отвечает.' });
        return;
    }
    
    sessionToken = sessionRes.token;
    
    sendToParent({ type: 'session-created', sessionId: sessionId });
    sendToParent({ type: 'status', text: 'Ожидаю получателя...', duration: 0 });
    
    // Шаг 2: Ждём получателя
    const matched = await waitForMatch();
    if (!matched) {
        sendToParent({ type: 'error', text: 'Таймаут: получатель не появился.' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Получатель готов. Создаю канал...', duration: 0 });
    
    // Шаг 3: Создаём WebRTC offer
    peerConnection = new RTCPeerConnection();
    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel(dataChannel);
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    await waitForIceComplete();
    
    // Шаг 4: Отправляем offer с токеном
    await apiCall('POST', '/offer', { sessionId: sessionId, sdp: peerConnection.localDescription.sdp, token: sessionToken });
    
    sendToParent({ type: 'status', text: 'Жду ответа...', duration: 0 });
    
    // Шаг 5: Ждём answer
    const answerSdp = await waitForAnswer();
    if (!answerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут ответа.' });
        return;
    }
    
    await peerConnection.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    sendToParent({ type: 'channel-open' });
}

async function waitForMatch() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const res = await apiCall('GET', `/session?id=${sessionId}&token=${sessionToken}`);
        if (res && res.status === 'matched') return true;
        await new Promise(r => setTimeout(r, 2000));
    }
    return false;
}

async function waitForAnswer() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const res = await apiCall('GET', `/answer?id=${sessionId}&token=${sessionToken}`);
        if (res && res.sdp) return res.sdp;
        await new Promise(r => setTimeout(r, 2000));
    }
    return null;
}

// ========== ПРИНЯТИЕ СЕССИИ (личность Б) ==========
async function acceptSession(id) {
    sessionId = id;
    myRole = 'receiver';
    statusDiv.textContent = 'Принимаю сессию: ' + id.slice(0, 8) + '...';
    
    sendToParent({ type: 'status', text: 'Подключаюсь...', duration: 0 });
    
    // Шаг 1: Отмечаемся как получатель
    const sessionRes = await apiCall('POST', '/session', { sessionId: sessionId, role: 'receiver' });
    if (!sessionRes || !sessionRes.token) {
        sendToParent({ type: 'error', text: 'Сервер не отвечает.' });
        return;
    }
    
    sessionToken = sessionRes.token;
    
    sendToParent({ type: 'status', text: 'Жду offer...', duration: 0 });
    
    // Шаг 2: Ждём offer
    const offerSdp = await waitForOffer();
    if (!offerSdp) {
        sendToParent({ type: 'error', text: 'Таймаут: создатель не ответил.' });
        return;
    }
    
    sendToParent({ type: 'status', text: 'Создаю ответ...', duration: 0 });
    
    // Шаг 3: Создаём answer
    peerConnection = new RTCPeerConnection();
    peerConnection.ondatachannel = (e) => {
        dataChannel = e.channel;
        setupDataChannel(dataChannel);
    };
    
    await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    await waitForIceComplete();
    
    // Шаг 4: Отправляем answer с токеном
    await apiCall('POST', '/answer', { sessionId: sessionId, sdp: peerConnection.localDescription.sdp, token: sessionToken });
    sendToParent({ type: 'channel-open' });
}

async function waitForOffer() {
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const res = await apiCall('GET', `/offer?id=${sessionId}&token=${sessionToken}`);
        if (res && res.sdp) return res.sdp;
        await new Promise(r => setTimeout(r, 2000));
    }
    return null;
}

// ========== ОБЩИЙ КОД ==========
function setupDataChannel(channel) {
    channel.onopen = () => {
        statusDiv.textContent = 'Канал открыт';
    };
    channel.onmessage = (e) => {
        sendToParent({ type: 'message', text: e.data, sender: 'Друг' });
    };
}

async function waitForIceComplete() {
    return new Promise(resolve => {
        if (peerConnection.iceGatheringState === 'complete') resolve();
        else peerConnection.addEventListener('icegatheringstatechange', () => {
            if (peerConnection.iceGatheringState === 'complete') resolve();
        });
    });
}

// ========== СЛУШАЕМ КОМАНДЫ ОТ ROBINHOOD (с проверкой токена) ==========
window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.action) return;
    
    // Проверка токена для всех команд кроме первой (pong-ready уже отправлен с токеном)
    if (data.action !== 'ping') {
        if (!data.robinToken || !validateRobinToken(data.robinToken)) {
            sendToParent({ type: 'error', text: 'Неверный токен доступа.' });
            return;
        }
    }
    
    switch(data.action) {
        case 'create':
            createSession();
            break;
        case 'accept':
            acceptSession(data.id);
            break;
        case 'send':
            if (dataChannel && dataChannel.readyState === 'open') {
                dataChannel.send(data.text);
            }
            break;
        case 'manual-sdp':
            handleManualSdp(data.sdp);
            break;
    }
});

async function handleManualSdp(sdpText) {
    try {
        const sdpObj = JSON.parse(sdpText);
        const pc = new RTCPeerConnection();
        if (sdpObj.type === 'offer') {
            pc.ondatachannel = (e) => {
                dataChannel = e.channel;
                setupDataChannel(dataChannel);
            };
            await pc.setRemoteDescription(sdpObj);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendToParent({ type: 'status', text: 'Ответ готов: ' + JSON.stringify(pc.localDescription), duration: 10000 });
        } else {
            dataChannel = pc.createDataChannel('chat');
            setupDataChannel(dataChannel);
            await pc.setRemoteDescription(sdpObj);
            sendToParent({ type: 'channel-open' });
        }
    } catch(e) {
        sendToParent({ type: 'error', text: 'Ошибка SDP: ' + e.message });
    }
}

// ========== ЗАПУСК ==========
checkRender();
</script>
</body>
</html>
