<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2PPong v3.1</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #0a1208; color: #e8d5a3; font-family: monospace; display: flex; justify-content: center; align-items: center; }
        #status { font-size: 1.2em; text-align: center; }
    </style>
</head>
<body>
    <div id="status">🏹 Загрузка...</div>
    <script>
        var MAIN_ORIGIN = 'https://stepweather-prog.github.io';
        (function(){
            var WORKERS_URL = 'https://robincall.stephanclaps-491.workers.dev';
            var RENDER_SERVER = 'https://p2ppong.onrender.com';
            var statusDiv = document.getElementById('status');
            var MY_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
            var isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
            var MAX_CHANNELS = isPWA ? 20 : 2;
            var channels = {}, handshakeSecret = null, pollIntervals = {}, failedPolls = {};
            var currentServer = 'render', isCreatingSession = false, createAbortController = null;
            var activePolls = {};

            // Безопасное восстановление каналов (секреты всё ещё сохраняются, но это можно отключить позже)
            try {
                var saved = localStorage.getItem('p2ppong_channels');
                if (saved) {
                    var parsed = JSON.parse(saved);
                    if (parsed && typeof parsed === 'object') {
                        Object.keys(parsed).forEach(function(sid) {
                            try {
                                if (parsed[sid] && parsed[sid].sessionSecret && parsed[sid].server) {
                                    channels[sid] = {
                                        sessionSecret: parsed[sid].sessionSecret,
                                        server: parsed[sid].server,
                                        status: parsed[sid].status || 'open',
                                        isCreator: parsed[sid].isCreator || false,
                                        tempKey: null
                                    };
                                }
                            } catch(e) { console.error('Ошибка восстановления канала ' + sid + ':', e.message); }
                        });
                        if (Object.keys(channels).length > 0) {
                            statusDiv.textContent = '🔄 Восстановлено ' + Object.keys(channels).length + ' колчанов';
                        }
                    }
                }
            } catch(e) { 
                console.error('Ошибка загрузки каналов:', e.message);
                try { localStorage.removeItem('p2ppong_channels'); } catch(ex) {} 
            }

            function saveChannels() {
                try {
                    var toSave = {};
                    Object.keys(channels).forEach(function(sid) {
                        if (channels[sid] && channels[sid].sessionSecret) {
                            toSave[sid] = { 
                                sessionSecret: channels[sid].sessionSecret, 
                                server: channels[sid].server || currentServer, 
                                status: channels[sid].status || 'open', 
                                isCreator: channels[sid].isCreator || false 
                            };
                        }
                    });
                    localStorage.setItem('p2ppong_channels', JSON.stringify(toSave));
                } catch(e) { console.error('Ошибка сохранения каналов:', e.message); }
            }

            function generateToken() { 
                return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2); 
            }

            async function sha256(text) {
                try {
                    var data = new TextEncoder().encode(text);
                    var hash = await crypto.subtle.digest('SHA-256', data);
                    return Array.from(new Uint8Array(hash)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
                } catch(e) { console.error('SHA-256 error:', e.message); return null; }
            }

            function hexToBytes(hex) { 
                if (!hex || hex.length % 2 !== 0) return new Uint8Array(0);
                var bytes = new Uint8Array(hex.length / 2); 
                for(var i = 0; i < bytes.length; i++) { bytes[i] = parseInt(hex.substring(i * 2, i * 2 + 2), 16); } 
                return bytes; 
            }

            async function importAESKey(keyHex) {
                try {
                    var raw = hexToBytes(keyHex);
                    return await crypto.subtle.importKey("raw", raw, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
                } catch(e) { console.error('Import AES key error:', e.message); return null; }
            }

            async function aesEncrypt(plaintext, keyHex) {
                try {
                    var key = await importAESKey(keyHex);
                    if (!key) return null;
                    var iv = crypto.getRandomValues(new Uint8Array(12));
                    var encoded = new TextEncoder().encode(plaintext);
                    var ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, key, encoded);
                    var payload = {
                        iv: btoa(String.fromCharCode.apply(null, iv)),
                        data: btoa(String.fromCharCode.apply(null, new Uint8Array(ciphertext)))
                    };
                    return JSON.stringify(payload);
                } catch(e) { console.error('AES encrypt error:', e.message); return null; }
            }

            async function aesDecrypt(payloadStr, keyHex) {
                try {
                    var key = await importAESKey(keyHex);
                    if (!key) return null;
                    var payload = JSON.parse(payloadStr);
                    if (!payload.iv || !payload.data) return null;
                    var iv = Uint8Array.from(atob(payload.iv), function(c) { return c.charCodeAt(0); });
                    var data = Uint8Array.from(atob(payload.data), function(c) { return c.charCodeAt(0); });
                    var decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, data);
                    return new TextDecoder().decode(decrypted);
                } catch(e) { console.error('AES decrypt error:', e.message); return null; }
            }

            async function apiCall(serverUrl, method, path, body, retries, signal) {
                if (retries === undefined) retries = 3;
                if (!serverUrl) return null;
                
                for(var attempt = 0; attempt < retries; attempt++) {
                    if (signal && signal.aborted) return null;
                    
                    var controller = new AbortController();
                    var timeout = setTimeout(function() { controller.abort(); }, 15000);
                    
                    if (signal) { 
                        var onAbort = function() { controller.abort(); };
                        signal.addEventListener('abort', onAbort);
                    }
                    
                    try {
                        var options = { 
                            method: method, 
                            headers: { 'Content-Type': 'application/json' }, 
                            signal: controller.signal 
                        };
                        if(body) options.body = JSON.stringify(body);
                        
                        var res = await fetch(serverUrl + path, options);
                        clearTimeout(timeout);
                        
                        if (signal) signal.removeEventListener('abort', onAbort);
                        
                        if(res.ok) {
                            try { return await res.json(); } catch(e) { return { status: 'ok' }; }
                        }
                        
                        if(res.status >= 500 && attempt < retries - 1) { 
                            await new Promise(function(r) { setTimeout(r, 2000 * (attempt + 1)); }); 
                            continue; 
                        }
                        
                        console.warn('API call failed:', res.status, res.statusText);
                        return null;
                    } catch(e) {
                        clearTimeout(timeout);
                        if (signal) signal.removeEventListener('abort', onAbort);
                        
                        if(e.name === 'AbortError') return null;
                        if(attempt < retries - 1) { 
                            await new Promise(function(r) { setTimeout(r, 2000 * (attempt + 1)); }); 
                            continue; 
                        }
                        console.error('API call error:', e.message);
                        return null;
                    }
                }
                return null;
            }

            function sendToParent(msg) { 
                try {
                    if(window.parent && window.parent !== window) { 
                        window.parent.postMessage(msg, MAIN_ORIGIN);
                    }
                } catch(e) { console.error('Send to parent error:', e.message); }
            }

            function startPolling(sid, secretKeyHex, server) {
                if (activePolls[sid]) { console.log('Polling already active for', sid); return; }
                stopPolling(sid);
                
                if (!channels[sid] || !secretKeyHex) { console.error('Cannot start polling: invalid channel or secret'); return; }
                
                activePolls[sid] = true;
                failedPolls[sid] = 0;
                var lastTime = Date.now();
                var serverUrl = server === 'workers' ? WORKERS_URL : RENDER_SERVER;
                
                function doPoll() {
                    if (!activePolls[sid]) return;
                    
                    apiCall(serverUrl, 'GET', '/message?id=' + sid + '&since=' + lastTime)
                        .then(function(res) {
                            if (!activePolls[sid]) return;
                            
                            if(res && res.messages) {
                                failedPolls[sid] = 0;
                                var promises = [];
                                
                                if (Array.isArray(res.messages)) {
                                    promises = res.messages.map(function(m) {
                                        return aesDecrypt(m.packet, secretKeyHex).then(function(decrypted) {
                                            if(decrypted) {
                                                try {
                                                    var parsed = JSON.parse(decrypted);
                                                    if(parsed.sender === MY_ID) { 
                                                        lastTime = Math.max(lastTime, m.time || 0); 
                                                        return; 
                                                    }
                                                    sendToParent({ 
                                                        type: 'message', 
                                                        text: parsed.text, 
                                                        sender: 'Друг', 
                                                        channelId: sid 
                                                    });
                                                } catch(err) { console.error('Parse error:', err.message); }
                                            }
                                            lastTime = Math.max(lastTime, m.time || 0);
                                        }).catch(function(err) { console.error('Decrypt error:', err.message); });
                                    });
                                }
                                
                                Promise.allSettled(promises).then(function() {
                                    if (activePolls[sid]) {
                                        pollIntervals[sid] = setTimeout(doPoll, server === 'workers' ? 1000 : 2000);
                                    }
                                });
                            } else {
                                failedPolls[sid]++;
                                if (activePolls[sid]) {
                                    var delay = Math.min(2000 * Math.pow(1.5, failedPolls[sid]), 30000);
                                    pollIntervals[sid] = setTimeout(doPoll, delay);
                                }
                            }
                        })
                        .catch(function(err) {
                            console.error('Poll error for', sid, ':', err.message);
                            if (activePolls[sid]) {
                                failedPolls[sid]++;
                                var delay = Math.min(2000 * Math.pow(1.5, failedPolls[sid]), 30000);
                                pollIntervals[sid] = setTimeout(doPoll, delay);
                            }
                        });
                }
                
                doPoll();
            }

            function stopPolling(sid) {
                activePolls[sid] = false;
                if(pollIntervals[sid]) { clearTimeout(pollIntervals[sid]); delete pollIntervals[sid]; }
                delete failedPolls[sid];
            }

            function cleanupChannel(sid) {
                stopPolling(sid);
                delete channels[sid];
                saveChannels();
            }

            window.addEventListener('beforeunload', function() {
                Object.keys(activePolls).forEach(function(sid) { stopPolling(sid); });
            });

            function restorePolling() {
                var restoredCount = 0;
                Object.keys(channels).forEach(function(sid) {
                    if(channels[sid] && channels[sid].sessionSecret && channels[sid].status === 'open') {
                        startPolling(sid, channels[sid].sessionSecret, channels[sid].server);
                        sendToParent({ 
                            type: 'channel-restored', 
                            secret: channels[sid].sessionSecret, 
                            channelId: sid, 
                            role: channels[sid].isCreator ? 'creator' : 'receiver' 
                        });
                        restoredCount++;
                    }
                });
                if (restoredCount > 0) {
                    statusDiv.textContent = '🔄 Восстановлено ' + restoredCount + ' каналов поллинга';
                }
            }

            async function checkServers() {
                try {
                    var renderPing = await apiCall(RENDER_SERVER, 'GET', '/ping');
                    var workersPing = await apiCall(WORKERS_URL, 'GET', '/ping');
                    
                    if (renderPing || workersPing) {
                        handshakeSecret = generateToken();
                        statusDiv.textContent = '✅ Готов (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
                        sendToParent({ type: 'pong-ready', handshake: handshakeSecret });
                        
                        if(Object.keys(channels).length > 0) {
                            sendToParent({ 
                                type: 'restored-channels', 
                                channels: Object.keys(channels).map(function(sid) {
                                    return { 
                                        channelId: sid, 
                                        secret: channels[sid].sessionSecret, 
                                        role: channels[sid].isCreator ? 'creator' : 'receiver' 
                                    };
                                }) 
                            });
                        }
                    } else {
                        statusDiv.textContent = '⏳ Серверы спят. Пробуем...';
                        setTimeout(checkServers, 5000);
                    }
                } catch(e) {
                    console.error('Check servers error:', e.message);
                    statusDiv.textContent = '⏳ Ошибка проверки серверов. Пробуем...';
                    setTimeout(checkServers, 5000);
                }
            }

            async function createSession() {
                if(isCreatingSession) { sendToParent({ type: 'error', text: '⚒ Стрела уже куётся.' }); return; }
                
                if(!isPWA && Object.keys(channels).length >= 2) { 
                    sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' }); 
                    sendToParent({ type: 'install-prompt' }); 
                    return; 
                }
                
                if(Object.keys(channels).length >= MAX_CHANNELS) { 
                    sendToParent({ type: 'error', text: 'Максимум ' + MAX_CHANNELS + ' колчанов.' }); 
                    return; 
                }

                isCreatingSession = true;
                createAbortController = new AbortController();
                var signal = createAbortController.signal;
                var server = currentServer;
                var serverUrl = server === 'workers' ? WORKERS_URL : RENDER_SERVER;
                statusDiv.textContent = '⚒ Создание маяка [' + server + ']...';

                try {
                    var tempKey = generateToken();
                    var beaconRes = await apiCall(serverUrl, 'POST', '/beacon', { tempKey: tempKey }, 3, signal);
                    
                    if(!beaconRes || !beaconRes.sessionId) {
                        isCreatingSession = false;
                        sendToParent({ type: 'error', text: 'Сервер не отвечает. Попробуйте позже.' });
                        statusDiv.textContent = '❌ Ошибка создания маяка';
                        return;
                    }
                    
                    var sid = beaconRes.sessionId;
                    var sessionSecret = await sha256(tempKey);
                    
                    if (!sessionSecret) {
                        isCreatingSession = false;
                        sendToParent({ type: 'error', text: 'Ошибка генерации ключа.' });
                        return;
                    }
                    
                    channels[sid] = { tempKey: tempKey, sessionSecret: sessionSecret, status: 'waiting', isCreator: true, server: server };
                    saveChannels();

                    var link = 'https://stepweather-prog.github.io/ROBINHOOD-P2P/?id=' + sid + '&key=' + tempKey + '&server=' + server;
                    sendToParent({ type: 'session-created', sessionId: sid, key: tempKey, fullLink: link });
                    sendToParent({ type: 'status', text: '📨 Ожидаю получателя (120 сек) [' + server + ']...' });

                    var matched = false;
                    var startTime = Date.now();
                    
                    while(Date.now() - startTime < 120000) {
                        if(signal.aborted) {
                            cleanupChannel(sid);
                            isCreatingSession = false;
                            sendToParent({ type: 'error', text: '⏹ Ожидание прервано.' });
                            statusDiv.textContent = '⏹ Ожидание прервано';
                            return;
                        }
                        
                        var check = await apiCall(serverUrl, 'GET', '/beacon?id=' + sid, 3, signal);
                        if(check && check.matched) { matched = true; break; }
                        await new Promise(function(r) { setTimeout(r, 4000); });
                    }

                    isCreatingSession = false;
                    
                    if(!matched) {
                        cleanupChannel(sid);
                        sendToParent({ type: 'error', text: '⏰ Таймаут ожидания. Никто не принял стрелу.' });
                        statusDiv.textContent = '⏰ Таймаут';
                        return;
                    }

                    channels[sid].status = 'open'; 
                    saveChannels();
                    startPolling(sid, sessionSecret, server);
                    sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: sid, role: 'creator' });
                    statusDiv.textContent = '🏹 Колчан открыт (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
                    
                } catch(e) {
                    isCreatingSession = false;
                    console.error('Create session error:', e.message);
                    sendToParent({ type: 'error', text: 'Ошибка создания сессии.' });
                    statusDiv.textContent = '❌ Ошибка';
                }
            }

            function cancelSessionCreation() {
                if(createAbortController) { createAbortController.abort(); createAbortController = null; }
                isCreatingSession = false;
                statusDiv.textContent = '⏹ Создание отменено';
            }

            async function acceptSession(sid, tempKey, server) {
                if(!sid || !tempKey) { sendToParent({ type: 'error', text: 'Неверная ссылка: нет данных сессии.' }); return; }
                
                if(!isPWA && Object.keys(channels).length >= 2) { 
                    sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' }); 
                    sendToParent({ type: 'install-prompt' }); 
                    return; 
                }
                
                if(Object.keys(channels).length >= MAX_CHANNELS) { 
                    sendToParent({ type: 'error', text: 'Максимум ' + MAX_CHANNELS + ' колчанов.' }); 
                    return; 
                }

                var serverUrl = server === 'workers' ? WORKERS_URL : RENDER_SERVER;
                statusDiv.textContent = '🔍 Поиск маяка [' + server + ']...';
                
                try {
                    var findRes = await apiCall(serverUrl, 'POST', '/find', { tempKey: tempKey });
                    
                    if(!findRes || findRes.status !== 'matched') { 
                        sendToParent({ type: 'error', text: '🏹 Маяк не найден или истек.' }); 
                        statusDiv.textContent = '❌ Маяк не найден';
                        return; 
                    }

                    var actualSid = findRes.sessionId || sid;
                    var sessionSecret = await sha256(tempKey);
                    
                    if (!sessionSecret) { sendToParent({ type: 'error', text: 'Ошибка генерации ключа.' }); return; }
                    
                    channels[actualSid] = { tempKey: tempKey, sessionSecret: sessionSecret, status: 'open', isCreator: false, server: server };
                    saveChannels();

                    startPolling(actualSid, sessionSecret, server);
                    sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: actualSid, role: 'receiver' });
                    statusDiv.textContent = '🏹 Колчан открыт (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
                    
                } catch(e) {
                    console.error('Accept session error:', e.message);
                    sendToParent({ type: 'error', text: 'Ошибка принятия сессии.' });
                    statusDiv.textContent = '❌ Ошибка';
                }
            }

            window.addEventListener('message', async function(event) {
                // Проверка origin – обязательно для безопасности
                if (event.origin !== MAIN_ORIGIN) return;
                
                var data = event.data;
                if(!data || !data.action) return;

                if(data.action === 'handshake') {
                    if(data.handshake === handshakeSecret && handshakeSecret) {
                        handshakeSecret = null;
                        restorePolling();
                        sendToParent({ type: 'handshake-ok' });
                    }
                    return;
                }

                if(data.action === 'cancel-create') { cancelSessionCreation(); return; }

                if(data.server) { currentServer = data.server; }

                if(data.action === 'send') {
                    var ch = channels[data.channelId];
                    if(!ch || !ch.sessionSecret) { sendToParent({ type: 'error', text: 'Канал не найден.' }); return; }
                    
                    if(data.secret !== ch.sessionSecret) { sendToParent({ type: 'error', text: 'Неверный секрет колчана.' }); return; }
                    
                    try {
                        var plaintext = JSON.stringify({ text: data.text, sender: MY_ID, time: Date.now() });
                        var packet = await aesEncrypt(plaintext, ch.sessionSecret);
                        
                        if (!packet) { sendToParent({ type: 'error', text: 'Ошибка шифрования сообщения.' }); return; }
                        
                        var serverUrl = ch.server === 'workers' ? WORKERS_URL : RENDER_SERVER;
                        await apiCall(serverUrl, 'POST', '/message', { sessionId: data.channelId, packet: packet });
                    } catch(e) {
                        console.error('Send message error:', e.message);
                        sendToParent({ type: 'error', text: 'Ошибка отправки сообщения.' });
                    }
                    return;
                }

                switch(data.action) {
                    case 'create': createSession(); break;
                    case 'accept': acceptSession(data.id, data.key, data.server || currentServer); break;
                    case 'restore-channels':
                        if(Object.keys(channels).length > 0) {
                            sendToParent({ 
                                type: 'restored-channels', 
                                channels: Object.keys(channels).map(function(sid) {
                                    return { channelId: sid, secret: channels[sid].sessionSecret, role: channels[sid].isCreator ? 'creator' : 'receiver' };
                                }) 
                            });
                        }
                        break;
                }
            });

            // Инициализация
            statusDiv.textContent = '🏹 Запуск P2PPong...';
            checkServers();
        })();
    </script>
</body>
</html>
