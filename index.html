<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong — надёжная стрела</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        button { padding: 10px 16px; margin: 5px; background: #2E7D32; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #388E3C; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #1e1e1e; border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        #chat { border: 1px solid #333; min-height: 200px; max-height: 50vh; overflow-y: auto; padding: 10px; margin: 10px 0; background: #1a1a1a; border-radius: 6px; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
        .link-box { word-break: break-all; background: #1e1e1e; padding: 10px; border: 1px solid #444; border-radius: 6px; margin: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <h3>⚡ P2PPong — надёжная стрела</h3>
    <div>
        <button id="createBtn">Создать стрелу</button>
        <div id="offerLink" class="link-box" style="display:none;"></div>
    </div>
    <div>
        <button id="acceptBtn" style="display:none;">Принять стрелу</button>
    </div>
    <div id="chat"></div>
    <div>
        <input type="text" id="messageInput" placeholder="Введи сообщение после соединения" disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
    <div id="status">Ожидание действий...</div>
</div>

<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const statusDiv = document.getElementById('status');
const chatDiv = document.getElementById('chat');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const createBtn = document.getElementById('createBtn');
const acceptBtn = document.getElementById('acceptBtn');
const offerLink = document.getElementById('offerLink');

let peerConnection;
let dataChannel;
let sessionId;
let waitingForAnswer = false;
let waitingForOffer = false;
let pollingInterval;

// ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
function generateUUID() {
    return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 15);
}

async function postToServer(payload) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 80000); // запас для пробуждения Render
    try {
        const res = await fetch(RENDER_SERVER + '/offer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            signal: ctrl.signal
        });
        clearTimeout(to);
        return res.ok;
    } catch(e) {
        clearTimeout(to);
        return false;
    }
}

async function getFromServer(sessionId) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 4000);
    try {
        const res = await fetch(RENDER_SERVER + '/offer?id=' + sessionId, { signal: ctrl.signal });
        clearTimeout(to);
        if (res.ok) {
            const data = await res.json();
            return data;
        }
    } catch(e) {
        clearTimeout(to);
    }
    return null;
}

function setupDataChannel(channel) {
    channel.onopen = () => {
        statusDiv.textContent = '✅ Канал открыт! Можно общаться.';
        messageInput.disabled = false;
        sendBtn.disabled = false;
    };
    channel.onmessage = (e) => {
        const msg = document.createElement('div');
        msg.textContent = `📩 Друг: ${e.data}`;
        chatDiv.appendChild(msg);
    };
}

// ========== СОЗДАНИЕ СТРЕЛЫ (Робин А) ==========
async function createOffer() {
    createBtn.disabled = true;
    statusDiv.textContent = 'Создаю приглашение...';
    
    sessionId = generateUUID();
    const link = window.location.href + '?id=' + sessionId;
    offerLink.style.display = 'block';
    offerLink.innerHTML = `<strong>Отправь эту ссылку другу:</strong><br>${link}`;
    statusDiv.textContent = 'Ссылка готова. Ожидаю подключения друга...';
    
    // Начинаем опрос: ждём, пока получатель отправит сигнал готовности
    waitingForOffer = false;
    startPollingForRecipient();
}

function startPollingForRecipient() {
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
        const data = await getFromServer(sessionId);
        if (data && data.status === 'ready') {
            // Получатель отметился, создаём WebRTC offer
            clearInterval(pollingInterval);
            pollingInterval = null;
            await createAndSendOffer();
        }
    }, 2000);
    
    // Таймаут ожидания получателя
    setTimeout(() => {
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            if (!peerConnection) {
                statusDiv.textContent = 'Таймаут: получатель не открыл ссылку за 90 секунд.';
                createBtn.disabled = false;
            }
        }
    }, 90000);
}

async function createAndSendOffer() {
    statusDiv.textContent = 'Получатель готов. Создаю защищённый канал...';
    
    peerConnection = new RTCPeerConnection();
    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel(dataChannel);
    
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    
    // Ждём сбора ICE-кандидатов
    await new Promise(resolve => {
        if (peerConnection.iceGatheringState === 'complete') resolve();
        else peerConnection.addEventListener('icegatheringstatechange', () => {
            if (peerConnection.iceGatheringState === 'complete') resolve();
        });
    });
    
    // Отправляем offer на Render
    const sent = await postToServer({ sdp: peerConnection.localDescription.sdp, sessionId: sessionId });
    if (!sent) {
        statusDiv.textContent = 'Ошибка отправки offer. Попробуйте позже.';
        createBtn.disabled = false;
        return;
    }
    
    statusDiv.textContent = 'Канал отправлен. Жду ответа...';
    startPollingForAnswer();
}

function startPollingForAnswer() {
    waitingForAnswer = true;
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
        if (!waitingForAnswer) return;
        const data = await getFromServer(sessionId);
        if (data && data.sdp && data.sdp !== peerConnection.localDescription.sdp) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            waitingForAnswer = false;
            try {
                await peerConnection.setRemoteDescription({ type: 'answer', sdp: data.sdp });
                statusDiv.textContent = '✅ Канал открыт!';
            } catch(e) {
                statusDiv.textContent = 'Ошибка установки соединения.';
                createBtn.disabled = false;
            }
        }
    }, 2000);
}

// ========== ПРИНЯТИЕ СТРЕЛЫ (Робин Б) ==========
async function acceptOffer() {
    const params = new URLSearchParams(window.location.search);
    sessionId = params.get('id');
    if (!sessionId) return;
    
    acceptBtn.style.display = 'none';
    statusDiv.textContent = 'Подключаюсь...';
    
    // Отправляем сигнал "я здесь"
    const sent = await postToServer({ status: 'ready', sessionId: sessionId });
    if (!sent) {
        statusDiv.textContent = 'Сервер не отвечает. Попробуйте позже.';
        return;
    }
    
    statusDiv.textContent = 'Ожидаю offer от создателя...';
    startPollingForOffer();
}

function startPollingForOffer() {
    waitingForOffer = true;
    if (pollingInterval) clearInterval(pollingInterval);
    pollingInterval = setInterval(async () => {
        if (!waitingForOffer) return;
        const data = await getFromServer(sessionId);
        if (data && data.sdp) {
            clearInterval(pollingInterval);
            pollingInterval = null;
            waitingForOffer = false;
            await handleReceivedOffer(data.sdp);
        }
    }, 2000);
}

async function handleReceivedOffer(offerSdp) {
    peerConnection = new RTCPeerConnection();
    peerConnection.ondatachannel = (e) => {
        dataChannel = e.channel;
        setupDataChannel(dataChannel);
    };
    
    try {
        await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });
    } catch(e) {
        statusDiv.textContent = 'Ошибка offer: ' + e.message;
        return;
    }
    
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    
    // Ждём сбора ICE-кандидатов
    await new Promise(resolve => {
        if (peerConnection.iceGatheringState === 'complete') resolve();
        else peerConnection.addEventListener('icegatheringstatechange', () => {
            if (peerConnection.iceGatheringState === 'complete') resolve();
        });
    });
    
    // Отправляем answer на Render
    const sent = await postToServer({ sdp: peerConnection.localDescription.sdp, sessionId: sessionId });
    if (sent) {
        statusDiv.textContent = 'Ответ отправлен. Канал устанавливается...';
    } else {
        statusDiv.textContent = 'Ошибка отправки ответа.';
    }
}

function sendMessage() {
    if (dataChannel && dataChannel.readyState === 'open') {
        const text = messageInput.value.trim();
        if (text) {
            dataChannel.send(text);
            const msg = document.createElement('div');
            msg.textContent = `📤 Я: ${text}`;
            chatDiv.appendChild(msg);
            messageInput.value = '';
        }
    }
}

createBtn.addEventListener('click', createOffer);
sendBtn.addEventListener('click', sendMessage);

if (window.location.search.includes('id=')) {
    acceptBtn.style.display = 'block';
    statusDiv.textContent = 'Нажми "Принять стрелу" для подключения.';
    acceptBtn.addEventListener('click', acceptOffer);
}
</script>
</body>
</html>
