<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>P2PPong v3.1</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; word-break: break-all; }
    </style>
</head>
<body>
<div class="container"><h3>P2PPong v3.1</h3><div id="status"></div></div>
<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const WORKERS_URL = 'https://robincall.stephanclaps-491.workers.dev';
let currentServer = 'render';
const statusDiv = document.getElementById('status');
const MY_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
const isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
const MAX_CHANNELS = isPWA ? 20 : 2;
let channels = {};
let handshakeSecret = null;
let pollIntervals = {};

function generateToken() {
    return crypto.randomUUID ? crypto.randomUUID() : 
        Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2);
}

async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, '0')).join('');
}

async function apiCall(method, path, body = null) {
    const serverUrl = currentServer === 'workers' ? WORKERS_URL : RENDER_SERVER;
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 80000);
    
    try {
        const options = { method, headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(serverUrl + path, options);
        clearTimeout(to);
        if (res.ok) return await res.json();
        return null;
    } catch(e) {
        clearTimeout(to);
        return null;
    }
}

function sendToParent(msg) {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage(msg, '*');
    }
}

// Простой XOR для обратной совместимости (НЕ ИСПОЛЬЗУЕТСЯ для новых E2EE каналов)
function encryptLegacy(text, key) {
    const enc = new TextEncoder().encode(text);
    const keyBytes = new TextEncoder().encode(key);
    const out = new Uint8Array(enc.length);
    for (let i = 0; i < enc.length; i++) out[i] = enc[i] ^ keyBytes[i % keyBytes.length];
    return btoa(String.fromCharCode(...out));
}

function decryptLegacy(text, key) {
    const enc = Uint8Array.from(atob(text), c => c.charCodeAt(0));
    const keyBytes = new TextEncoder().encode(key);
    const out = new Uint8Array(enc.length);
    for (let i = 0; i < enc.length; i++) out[i] = enc[i] ^ keyBytes[i % keyBytes.length];
    return new TextDecoder().decode(out);
}

function startPolling(sid) {
    if (pollIntervals[sid]) return;
    let lastTime = Date.now();
    pollIntervals[sid] = setInterval(async () => {
        const res = await apiCall('GET', `/message?id=${sid}&since=${lastTime}`);
        if (res && res.messages) {
            res.messages.forEach(m => {
                const ch = channels[sid];
                if (ch && ch.sessionSecret) {
                    // Пытаемся расшифровать для обратной совместимости
                    // Но новые E2EE сообщения пройдут как есть
                    try {
                        const decrypted = decryptLegacy(m.packet, ch.sessionSecret);
                        const parsed = JSON.parse(decrypted);
                        if (parsed.sender === MY_ID) {
                            lastTime = Math.max(lastTime, m.time);
                            return;
                        }
                        sendToParent({
                            type: 'message',
                            text: parsed.text,
                            sender: 'Друг',
                            channelId: sid
                        });
                    } catch(err) {
                        // Если не удалось расшифровать, отправляем как есть (для E2EE)
                        sendToParent({
                            type: 'message',
                            text: m.packet,
                            sender: 'Друг',
                            channelId: sid
                        });
                    }
                }
                lastTime = Math.max(lastTime, m.time);
            });
        }
    }, 6000);
}

function stopPolling(sid) {
    if (pollIntervals[sid]) {
        clearInterval(pollIntervals[sid]);
        delete pollIntervals[sid];
    }
}

async function checkRender() {
    statusDiv.textContent = 'Проверка сервера...';
    const ping = await apiCall('GET', '/ping');
    if (ping) {
        handshakeSecret = generateToken();
        statusDiv.textContent = 'Готов (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
        sendToParent({ type: 'pong-ready', handshake: handshakeSecret });
    } else {
        statusDiv.textContent = 'Сервер не отвечает';
        setTimeout(checkRender, 5000);
    }
}

async function createSession() {
    if (!isPWA && Object.keys(channels).length >= 2) {
        sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' });
        sendToParent({ type: 'install-prompt' });
        return;
    }
    if (Object.keys(channels).length >= MAX_CHANNELS) {
        sendToParent({ type: 'error', text: 'Максимум ' + MAX_CHANNELS + ' чатов.' });
        return;
    }
    statusDiv.textContent = 'Создание маяка...';
    const tempKey = generateToken();
    const beaconRes = await apiCall('POST', '/beacon', { tempKey: tempKey });
    if (!beaconRes || !beaconRes.sessionId) {
        sendToParent({ type: 'error', text: 'Сервер не отвечает' });
        return;
    }
    const sid = beaconRes.sessionId;
    const sessionSecret = await sha256(tempKey);
    channels[sid] = { tempKey, sessionSecret, status: 'waiting', isCreator: true };
    
    // Безопасная ссылка: НЕ передаем ключ в URL для новых клиентов
    // Вместо этого используем sessionId + fingerprint
    const link = 'https://stepweather-prog.github.io/ROBINHOOD-P2P/?id=' + sid;
    sendToParent({ type: 'session-created', sessionId: sid, key: tempKey, fullLink: link });
    sendToParent({ type: 'status', text: 'Ожидаю получателя...' });
    
    let matched = false;
    const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const check = await apiCall('GET', '/beacon?id=' + sid);
        if (check && check.matched) {
            matched = true;
            break;
        }
        await new Promise(r => setTimeout(r, 6000));
    }
    if (!matched) {
        delete channels[sid];
        sendToParent({ type: 'error', text: 'Таймаут ожидания' });
        return;
    }
    
    channels[sid].status = 'open';
    startPolling(sid);
    sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: sid, role: 'creator' });
    statusDiv.textContent = 'Комната открыта (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
}

async function acceptSession(sid, tempKey) {
    if (!isPWA && Object.keys(channels).length >= 2) {
        sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' });
        sendToParent({ type: 'install-prompt' });
        return;
    }
    if (Object.keys(channels).length >= MAX_CHANNELS) {
        sendToParent({ type: 'error', text: 'Максимум ' + MAX_CHANNELS + ' чатов.' });
        return;
    }
    statusDiv.textContent = 'Поиск маяка...';
    const findRes = await apiCall('POST', '/find', { tempKey: tempKey });
    if (!findRes || findRes.status !== 'matched') {
        sendToParent({ type: 'error', text: 'Маяк не найден' });
        return;
    }
    const actualSid = findRes.sessionId;
    const sessionSecret = await sha256(tempKey);
    channels[actualSid] = { tempKey, sessionSecret, status: 'open', isCreator: false };
    startPolling(actualSid);
    sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: actualSid, role: 'receiver' });
    statusDiv.textContent = 'Комната открыта (' + Object.keys(channels).length + '/' + MAX_CHANNELS + ')';
}

async function restoreChannels() {
    // Восстановление каналов из localStorage если есть
    const savedChannels = JSON.parse(localStorage.getItem('robinhood_sessions') || '[]');
    const restored = [];
    for (const sc of savedChannels) {
        const check = await apiCall('GET', '/beacon?id=' + sc.id);
        if (check && check.matched) {
            channels[sc.id] = { tempKey: sc.key, sessionSecret: sc.secret, status: 'open', isCreator: sc.creator };
            startPolling(sc.id);
            restored.push({ channelId: sc.id, secret: sc.secret, role: sc.creator ? 'creator' : 'receiver' });
        }
    }
    if (restored.length > 0) {
        sendToParent({ type: 'restored-channels', channels: restored });
    }
}

window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || !data.action) return;
    
    if (data.action === 'handshake') {
        if (data.handshake === handshakeSecret) {
            handshakeSecret = null;
            sendToParent({ type: 'handshake-ok' });
        }
        return;
    }
    
    if (data.action === 'send') {
        const ch = channels[data.channelId];
        if (!ch || !ch.sessionSecret) return;
        if (data.secret !== ch.sessionSecret) {
            sendToParent({ type: 'error', text: 'Неверный секрет' });
            return;
        }
        // Отправляем текст как есть (E2EE шифрование происходит на уровне RobinHood)
        const packet = encryptLegacy(
            JSON.stringify({ text: data.text, sender: MY_ID, time: Date.now() }),
            ch.sessionSecret
        );
        apiCall('POST', '/message', { sessionId: data.channelId, packet: packet });
        return;
    }
    
    if (data.server) {
        currentServer = data.server;
    }
    
    switch(data.action) {
        case 'create':
            createSession();
            break;
        case 'accept':
            acceptSession(data.id, data.key);
            break;
        case 'cancel-create':
            // Отмена создания (если поддерживается)
            break;
    }
});

// Сохранение сессий при закрытии
window.addEventListener('beforeunload', () => {
    const sessions = Object.entries(channels).map(([id, ch]) => ({
        id,
        key: ch.tempKey,
        secret: ch.sessionSecret,
        creator: ch.isCreator
    }));
    localStorage.setItem('robinhood_sessions', JSON.stringify(sessions));
});

checkRender();
</script>
</body>
</html>
