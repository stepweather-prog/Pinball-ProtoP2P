<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>P2PPong v3.0</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container"><h3>P2PPong v3.0</h3><div id="status"></div></div>
<script>
const RENDER_SERVER = 'https://p2ppong.onrender.com';
const statusDiv = document.getElementById('status');
const MY_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2);
const isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone;
const MAX_CHANNELS = isPWA ? 20 : 2;
let channels = {};
let handshakeSecret = null;

const iceServers = {
    iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        { urls: 'stun:stun3.l.google.com:19302' },
        { urls: 'stun:stun4.l.google.com:19302' }
    ]
};

function generateToken() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2)+Math.random().toString(36).substring(2); }

async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function apiCall(method, path, body = null) {
    const ctrl = new AbortController(); const to = setTimeout(() => ctrl.abort(), 80000);
    try {
        const options = { method, headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(RENDER_SERVER + path, options); clearTimeout(to);
        if (res.ok) return await res.json(); return null;
    } catch(e) { clearTimeout(to); return null; }
}

function sendToParent(msg) { if (window.parent && window.parent !== window) window.parent.postMessage(msg, '*'); }

function setupDataChannel(channel, sid, isCreator) {
    channel.onopen = () => {
        statusDiv.textContent = 'Канал '+sid.slice(0,8)+' открыт';
        if (isCreator) {
            channel.send(JSON.stringify({ type: 'secret', secret: channels[sid].sessionSecret }));
        }
        sendToParent({ type: 'channel-open', secret: channels[sid].sessionSecret, channelId: sid });
    };
    channel.onmessage = (e) => {
        if (!isCreator) {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'secret') {
                    channels[sid].sessionSecret = msg.secret;
                    sendToParent({ type: 'channel-open', secret: msg.secret, channelId: sid });
                    return;
                }
            } catch(err) {}
        }
        let text = e.data; const ch = channels[sid];
        if (ch && ch.sessionSecret) { try { text = decrypt(text, ch.sessionSecret); } catch(err) {} }
        sendToParent({ type: 'message', text: text, sender: 'Друг', channelId: sid });
    };
}

function encrypt(text, key) {
    const enc = new TextEncoder().encode(text);
    const keyBytes = new TextEncoder().encode(key);
    const out = new Uint8Array(enc.length);
    for (let i = 0; i < enc.length; i++) out[i] = enc[i] ^ keyBytes[i % keyBytes.length];
    return btoa(String.fromCharCode(...out));
}

function decrypt(text, key) {
    const enc = Uint8Array.from(atob(text), c => c.charCodeAt(0));
    const keyBytes = new TextEncoder().encode(key);
    const out = new Uint8Array(enc.length);
    for (let i = 0; i < enc.length; i++) out[i] = enc[i] ^ keyBytes[i % keyBytes.length];
    return new TextDecoder().decode(out);
}

async function waitForIceComplete(pc) {
    return new Promise(resolve => {
        if (pc.iceGatheringState === 'complete') resolve();
        else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') resolve(); });
    });
}

async function checkRender() {
    statusDiv.textContent = 'Проверка сервера...';
    const ping = await apiCall('GET', '/ping');
    if (ping) {
        handshakeSecret = generateToken();
        statusDiv.textContent = 'Готов ('+Object.keys(channels).length+'/'+MAX_CHANNELS+')';
        sendToParent({ type: 'pong-ready', handshake: handshakeSecret });
    } else { statusDiv.textContent = 'Сервер не отвечает'; setTimeout(checkRender, 5000); }
}

async function createSession() {
    if (!isPWA && Object.keys(channels).length >= 2) {
        sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' });
        sendToParent({ type: 'install-prompt' }); return;
    }
    if (Object.keys(channels).length >= MAX_CHANNELS) {
        sendToParent({ type: 'error', text: 'Максимум '+MAX_CHANNELS+' чатов.' }); return;
    }
    statusDiv.textContent = 'Создание маяка...';
    const tempKey = generateToken();
    const beaconRes = await apiCall('POST', '/beacon', { tempKey: tempKey });
    if (!beaconRes || !beaconRes.sessionId) { sendToParent({ type: 'error', text: 'Сервер не отвечает' }); return; }
    const sid = beaconRes.sessionId;
    const sessionSecret = await sha256(tempKey);
    channels[sid] = { pc: null, dc: null, tempKey, sessionSecret, status: 'waiting', isCreator: true };
    const link = 'https://stepweather-prog.github.io/ROBINHOOD-P2P/?id=' + sid + '&key=' + tempKey;
    sendToParent({ type: 'session-created', sessionId: sid, key: tempKey, fullLink: link });
    sendToParent({ type: 'status', text: 'Ожидаю получателя...' });
    
    let matched = false; const startTime = Date.now();
    while (Date.now() - startTime < 90000) {
        const check = await apiCall('GET', '/beacon?id=' + sid);
        if (check && check.matched) { matched = true; break; }
        await new Promise(r => setTimeout(r, 2000));
    }
    if (!matched) { delete channels[sid]; sendToParent({ type: 'error', text: 'Таймаут ожидания' }); return; }
    
    sendToParent({ type: 'status', text: 'Создание канала...' });
    const pc = new RTCPeerConnection(iceServers); const dc = pc.createDataChannel('chat');
    channels[sid].pc = pc; channels[sid].dc = dc; setupDataChannel(dc, sid, true);
    const offer = await pc.createOffer(); await pc.setLocalDescription(offer); await waitForIceComplete(pc);
        await apiCall('POST', '/offer', { sessionId: sid, sdp: pc.localDescription.sdp });
    await new Promise(r => setTimeout(r, 2000));
    sendToParent({ type: 'status', text: 'Ожидание ответа...' });
    
    let answerSdp = null; const ansStart = Date.now();
    while (Date.now() - ansStart < 90000) {
        const ans = await apiCall('GET', '/answer?id=' + sid);
        if (ans && ans.sdp) { answerSdp = ans.sdp; break; }
        await new Promise(r => setTimeout(r, 2000));
    }
    if (!answerSdp) { delete channels[sid]; sendToParent({ type: 'error', text: 'Таймаут ответа' }); return; }
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
    channels[sid].status = 'open';
    statusDiv.textContent = 'Готов ('+Object.keys(channels).length+'/'+MAX_CHANNELS+')';
}

async function acceptSession(sid, tempKey) {
    if (!isPWA && Object.keys(channels).length >= 2) {
        sendToParent({ type: 'error', text: 'Установите приложение для новых чатов.' });
        sendToParent({ type: 'install-prompt' }); return;
    }
    if (Object.keys(channels).length >= MAX_CHANNELS) {
        sendToParent({ type: 'error', text: 'Максимум '+MAX_CHANNELS+' чатов.' }); return;
    }
    statusDiv.textContent = 'Поиск маяка...';
    const findRes = await apiCall('POST', '/find', { tempKey: tempKey, receiverId: MY_ID });
    if (!findRes || findRes.status !== 'matched') { sendToParent({ type: 'error', text: 'Маяк не найден' }); return; }
    const actualSid = findRes.sessionId;
    const sessionSecret = await sha256(tempKey);
    channels[actualSid] = { pc: null, dc: null, tempKey, sessionSecret, status: 'connecting', isCreator: false };
    
    sendToParent({ type: 'status', text: 'Ожидание предложения...' });
    let offerSdp = null; const offStart = Date.now();
    while (Date.now() - offStart < 120000) {
        const off = await apiCall('GET', '/offer?id=' + actualSid);
        if (off && off.sdp) { offerSdp = off.sdp; break; }
        await new Promise(r => setTimeout(r, 2000));
    }
    if (!offerSdp) { delete channels[actualSid]; sendToParent({ type: 'error', text: 'Таймаут предложения' }); return; }
    
    sendToParent({ type: 'status', text: 'Создание ответа...' });
    const pc = new RTCPeerConnection(iceServers); channels[actualSid].pc = pc;
    pc.ondatachannel = (e) => { channels[actualSid].dc = e.channel; setupDataChannel(e.channel, actualSid, false); };
    await pc.setRemoteDescription({ type: 'offer', sdp: offerSdp });
    const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); await waitForIceComplete(pc);
    await apiCall('POST', '/answer', { sessionId: actualSid, sdp: pc.localDescription.sdp });
    channels[actualSid].status = 'open';
    statusDiv.textContent = 'Готов ('+Object.keys(channels).length+'/'+MAX_CHANNELS+')';
}

window.addEventListener('message', (event) => {
    const data = event.data; if (!data || !data.action) return;
    if (data.action === 'handshake') { if (data.handshake === handshakeSecret) { handshakeSecret = null; sendToParent({ type: 'handshake-ok' }); } return; }
    if (data.action === 'send') {
        const ch = channels[data.channelId]; if (!ch || !ch.sessionSecret) return;
        if (data.secret !== ch.sessionSecret) { sendToParent({ type: 'error', text: 'Неверный секрет' }); return; }
        if (ch.dc && ch.dc.readyState === 'open') {
            ch.dc.send(encrypt(data.text, ch.sessionSecret));
        }
        return;
    }
    switch(data.action) { case 'create': createSession(); break; case 'accept': acceptSession(data.id, data.key); break; }
});

checkRender();
</script>
</body>
</html>
