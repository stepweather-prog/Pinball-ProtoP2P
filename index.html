<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2PPong v4.0</title>
    <link rel="icon" type="image/png" sizes="192x192" href="https://stepweather-prog.github.io/ROBINHOOD-P2P/assets/avatars/001-.png">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://p2ppong.onrender.com https://robincall.stephanclaps-491.workers.dev; img-src 'self' data: https://stepweather-prog.github.io;">
    <style>
        :root { --bg: #0d1a0c; --bg2: #1a2a1f; --accent: #c4a24b; --accent2: #e8d5a3; --text: #e8e2c7; --dim: #b8a87a; --border: #c4a24b; --green: #4caf50; --red: #f44336; --orange: #ff9800; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:linear-gradient(135deg,var(--bg),var(--bg2)); color:var(--text); font-family:'Segoe UI','Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
        .container { width:100%; max-width:500px; background:rgba(20,30,18,0.95); border:2px solid var(--border); border-radius:20px; padding:24px; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
        h2 { text-align:center; background:linear-gradient(135deg,var(--accent2),var(--accent)); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:20px; }
        .status-row { display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
        .status-dot { width:10px; height:10px; border-radius:50%; }
        .status-dot.online { background:var(--green); box-shadow:0 0 8px var(--green); }
        .status-dot.offline { background:var(--red); }
        .status-dot.checking { background:var(--orange); animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .server-cards { display:flex; gap:10px; margin-bottom:16px; }
        .server-card { flex:1; padding:12px; border-radius:12px; border:1px solid var(--border); text-align:center; cursor:pointer; transition:0.2s; background:rgba(255,255,255,0.03); }
        .server-card:hover { background:rgba(196,162,75,0.15); }
        .server-card.active { border-color:var(--green); background:rgba(76,175,80,0.1); }
        .server-name { font-weight:bold; font-size:0.9em; color:var(--accent2); }
        .server-status { font-size:0.65em; color:var(--dim); margin-top:4px; }
        .log-box { background:rgba(0,0,0,0.4); border-radius:10px; padding:10px; max-height:200px; overflow-y:auto; font-family:monospace; font-size:0.6em; color:var(--dim); margin-top:12px; }
        .log-entry { margin:3px 0; }
        .log-entry.success { color:var(--green); } .log-entry.error { color:var(--red); } .log-entry.info { color:var(--accent2); }
        .stats-row { display:flex; justify-content:space-between; font-size:0.6em; color:var(--dim); margin-top:12px; flex-wrap:wrap; gap:4px; }
        button { width:100%; padding:12px; border-radius:10px; border:1px solid var(--border); background:rgba(196,162,75,0.1); color:var(--text); cursor:pointer; font-weight:bold; font-size:0.9em; transition:0.2s; margin-top:8px; }
        button:hover { background:rgba(196,162,75,0.25); }
        .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.7em; font-weight:bold; }
        .badge-pwa { background:rgba(76,175,80,0.2); color:var(--green); }
        .badge-browser { background:rgba(255,152,0,0.2); color:var(--orange); }
    </style>
</head>
<body>
<div class="container">
    <h2>🏹 P2PPong v4.0</h2>
    <div class="status-row">
        <span class="status-dot checking" id="status-dot"></span>
        <span id="status-text">Проверка...</span>
        <span class="badge" id="pwa-badge">Браузер</span>
    </div>
    <div class="server-cards">
        <div class="server-card active" id="card-render">
            <div class="server-name">🌐 Render</div>
            <div class="server-status" id="render-status">🟡 Проверка...</div>
        </div>
        <div class="server-card" id="card-workers">
            <div class="server-name">⚡ Workers</div>
            <div class="server-status" id="workers-status">🟡 Проверка...</div>
        </div>
    </div>
    <button id="btn-refresh">🔄 Проверить серверы</button>
    <div class="log-box" id="log-box"></div>
    <div class="stats-row">
        <span>ID: <span id="node-id">-</span></span>
        <span>Каналы: <span id="ch-count">0/2</span></span>
        <span>Пиры: <span id="peer-count">0</span></span>
    </div>
</div>

<script>
(function() {
    'use strict';
    const RENDER = 'https://p2ppong.onrender.com';
    const WORKERS = 'https://robincall.stephanclaps-491.workers.dev';
    const PONG_SESSIONS_KEY = 'robinhood_pong_sessions';
    const PONG_SECURE_KEY = 'pong_secure_v1';
    
    let currentServer = 'render';
    let channels = {};
    let handshakeSecret = null;
    let pollIntervals = {};
    let serverStatuses = { render: 'checking', workers: 'checking' };
    
    const parentOrigin = document.referrer || '';
    const isRobinCall = parentOrigin.includes('ROBINHOOD-P2PCall');
    const APP_BASE_URL = isRobinCall ? 
        'https://stepweather-prog.github.io/ROBINHOOD-P2PCall/' : 
        'https://stepweather-prog.github.io/ROBINHOOD-P2P/';

    const NODE_ID = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Date.now().toString(36);
    const isPWA = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone || false;
    const MAX_CH = isPWA ? 20 : 2;

    function $(id) { return document.getElementById(id); }
    function log(msg, type = 'info') {
        const entry = document.createElement('div'); entry.className = 'log-entry ' + type;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        const box = $('log-box'); box.insertBefore(entry, box.firstChild);
        if (box.children.length > 50) box.lastChild.remove();
        console.log('[P2PPong]', msg);
    }
    function updateUI() {
        const cs = serverStatuses[currentServer];
        $('status-dot').className = 'status-dot ' + (cs === 'online' ? 'online' : cs === 'checking' ? 'checking' : 'offline');
        $('status-text').textContent = cs === 'online' ? '✅ Готов' : cs === 'checking' ? '🟡 Проверка...' : '❌ Офлайн';
        $('pwa-badge').textContent = isPWA ? 'PWA (20)' : 'Браузер (2)';
        $('pwa-badge').className = isPWA ? 'badge badge-pwa' : 'badge badge-browser';
        $('ch-count').textContent = Object.keys(channels).length + '/' + MAX_CH;
        $('node-id').textContent = NODE_ID.substring(0, 10) + '...';
        $('card-render').classList.toggle('active', currentServer === 'render');
        $('card-workers').classList.toggle('active', currentServer === 'workers');
        $('render-status').textContent = (serverStatuses.render === 'online' ? '🟢 ' : '🔴 ') + (serverStatuses.render === 'online' ? 'Онлайн' : 'Офлайн');
        $('workers-status').textContent = (serverStatuses.workers === 'online' ? '🟢 ' : '🔴 ') + (serverStatuses.workers === 'online' ? 'Онлайн' : 'Офлайн');
        if ($('peer-count')) $('peer-count').textContent = Object.keys(channels).length;
    }
    function sendToParent(msg) { if (window.parent && window.parent !== window) { try { window.parent.postMessage(msg, '*'); } catch (e) {} } }

    async function apiCall(method, path, body = null, retries = 1) {
        const url = currentServer === 'workers' ? WORKERS : RENDER;
        for (let a = 0; a <= retries; a++) {
            const ctrl = new AbortController(), timeout = setTimeout(() => ctrl.abort(), currentServer === 'workers' ? 5000 : 10000);
            try { const opts = { method, headers: { 'Content-Type': 'application/json' }, signal: ctrl.signal }; if (body) opts.body = JSON.stringify(body); const res = await fetch(url + path, opts); clearTimeout(timeout); if (!res.ok) { if (a < retries) { await new Promise(r => setTimeout(r, 2000)); continue; } return null; } return await res.json(); }
            catch (e) { clearTimeout(timeout); if (a < retries) { await new Promise(r => setTimeout(r, 3000)); continue; } return null; }
        }
        return null;
    }

    async function checkServer(server) { const prev = currentServer; if (server) currentServer = server; const ping = await apiCall('GET', '/ping'); serverStatuses[currentServer] = ping ? 'online' : 'offline'; if (server) currentServer = prev; updateUI(); if (ping && !handshakeSecret) { handshakeSecret = generateToken(); sendToParent({ type: 'pong-ready', handshake: handshakeSecret }); log('Handshake отправлен', 'success'); } return ping !== null; }
    async function checkAllServers() { await Promise.all([checkServer('render'), checkServer('workers')]); if (serverStatuses[currentServer] === 'offline') { const other = currentServer === 'render' ? 'workers' : 'render'; if (serverStatuses[other] === 'online') switchServer(other); } updateUI(); }
    function switchServer(server) { if (server === currentServer) return; log('Переключение на ' + (server === 'workers' ? 'Workers' : 'Render'), 'info'); currentServer = server; try { localStorage.setItem('robinhood_server', currentServer); } catch (e) {} stopAllPolling(); handshakeSecret = null; sendToParent({ type: 'server-switched', server: currentServer }); checkServer().then(() => { if (serverStatuses[currentServer] === 'online') { handshakeSecret = generateToken(); sendToParent({ type: 'pong-ready', handshake: handshakeSecret }); restoreSessions(); } }); updateUI(); }
    function generateToken() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2) + Math.random().toString(36).substring(2); }
    async function sha256(text) { const data = new TextEncoder().encode(text); const hash = await crypto.subtle.digest('SHA-256', data); return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join(''); }

    function startPolling(sid) { if (pollIntervals[sid]) return; let lastTime = Date.now(), pollCount = 0; const interval = currentServer === 'workers' ? 4000 : 8000; const poll = async () => { pollCount++; if (currentServer === 'workers' && Object.keys(channels).length > 5 && pollCount % 3 !== 0) return; try { const res = await apiCall('GET', '/message?id=' + sid + '&since=' + lastTime); if (!res || !res.messages) return; for (const m of res.messages) { const ch = channels[sid]; if (!ch || !ch.sessionSecret) continue; let text = m.packet; try { const parsed = JSON.parse(m.packet); if (parsed.sender === NODE_ID) { lastTime = Math.max(lastTime, m.time); continue; } text = parsed.text || m.packet; } catch (err) {} sendToParent({ type: 'message', text: text, sender: 'Друг', channelId: sid }); lastTime = Math.max(lastTime, m.time); } } catch (e) {} }; poll(); pollIntervals[sid] = setInterval(poll, interval); }
    function stopPolling(sid) { if (pollIntervals[sid]) { clearInterval(pollIntervals[sid]); delete pollIntervals[sid]; } }
    function stopAllPolling() { Object.keys(pollIntervals).forEach(stopPolling); }

    async function getPongStorageKey() { let kb = localStorage.getItem(PONG_SECURE_KEY); if (!kb) { const k = await crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt", "decrypt"]); const r = await crypto.subtle.exportKey("raw", k); kb = btoa(String.fromCharCode(...new Uint8Array(r))); localStorage.setItem(PONG_SECURE_KEY, kb); return k; } const r = Uint8Array.from(atob(kb), c => c.charCodeAt(0)); return await crypto.subtle.importKey("raw", r, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]); }
    async function saveSessions() { try { const s = Object.entries(channels).filter(([_, c]) => c.status === 'open').map(([id, c]) => ({ id, key: c.tempKey, secret: c.sessionSecret, creator: c.isCreator, createdAt: c.createdAt })); if (!s.length) { localStorage.removeItem(PONG_SESSIONS_KEY); return; } const sk = await getPongStorageKey(); const iv = crypto.getRandomValues(new Uint8Array(12)); const enc = new TextEncoder().encode(JSON.stringify(s)); const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, sk, enc); const combined = new Uint8Array(iv.length + new Uint8Array(ct).length); combined.set(iv); combined.set(new Uint8Array(ct), iv.length); localStorage.setItem(PONG_SESSIONS_KEY, btoa(String.fromCharCode(...combined))); } catch (e) {} }
    async function restoreSessions() { try { const stored = localStorage.getItem(PONG_SESSIONS_KEY); if (!stored) return; const sk = await getPongStorageKey(); const combined = Uint8Array.from(atob(stored), c => c.charCodeAt(0)); const iv = combined.slice(0, 12); const ct = combined.slice(12); const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, sk, ct); const sessions = JSON.parse(new TextDecoder().decode(dec)); const now = Date.now(), restored = []; for (const sc of sessions) { if (now - sc.createdAt > 7 * 24 * 60 * 60 * 1000) continue; const check = await apiCall('GET', '/beacon?id=' + sc.id); if (check && check.matched) { channels[sc.id] = { tempKey: sc.key, sessionSecret: sc.secret, status: 'open', isCreator: sc.creator, createdAt: sc.createdAt }; startPolling(sc.id); restored.push({ channelId: sc.id, secret: sc.secret, role: sc.creator ? 'creator' : 'receiver' }); } } if (restored.length > 0) sendToParent({ type: 'restored-channels', channels: restored }); updateUI(); } catch (e) { log('Ошибка восстановления: ' + e.message, 'error'); } }

    async function createSession(clientTempKey) { const count = Object.keys(channels).length; if (count >= MAX_CH) { sendToParent({ type: 'error', text: isPWA ? 'Максимум ' + MAX_CH + ' каналов.' : 'Максимум ' + MAX_CH + ' каналов. Установите PWA для 20.' }); if (!isPWA) sendToParent({ type: 'install-prompt' }); return; } const tempKey = clientTempKey || generateToken(); const tempKeyHash = await sha256(tempKey); const beaconRes = await apiCall('POST', '/beacon', { tempKeyHash }); if (!beaconRes || !beaconRes.sessionId) { sendToParent({ type: 'error', text: 'Сервер не отвечает. Попробуйте переключить.' }); return; } const sid = beaconRes.sessionId, sessionSecret = await sha256(tempKey); channels[sid] = { tempKey, sessionSecret, status: 'waiting', isCreator: true, createdAt: Date.now() }; const link = APP_BASE_URL + '?id=' + sid + '&server=' + currentServer + '#key=' + tempKey; sendToParent({ type: 'session-created', sessionId: sid, key: tempKey, fullLink: link }); log('Маяк: ' + sid.substring(0, 8) + '...', 'success'); updateUI(); let matched = false; const start = Date.now(); while (Date.now() - start < 90000) { const check = await apiCall('GET', '/beacon?id=' + sid); if (check && check.matched) { matched = true; break; } await new Promise(r => setTimeout(r, 5000)); } if (!matched) { delete channels[sid]; saveSessions(); sendToParent({ type: 'error', text: 'Таймаут ожидания' }); updateUI(); return; } channels[sid].status = 'open'; startPolling(sid); saveSessions(); sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: sid, role: 'creator' }); log('Канал открыт!', 'success'); updateUI(); }
    async function acceptSession(sid, tempKey) { if (Object.keys(channels).length >= MAX_CH) { sendToParent({ type: 'error', text: 'Максимум каналов' }); if (!isPWA) sendToParent({ type: 'install-prompt' }); return; } if (channels[sid]) { sendToParent({ type: 'error', text: 'Уже в канале' }); return; } log('Поиск маяка: ' + sid.substring(0, 8) + '...'); const findKey = tempKey || generateToken(); const findRes = await apiCall('POST', '/find', { tempKey: findKey }); if (!findRes || findRes.status !== 'matched') { sendToParent({ type: 'error', text: 'Маяк не найден. Проверьте сервер.' }); return; } const actualSid = findRes.sessionId || sid, sessionSecret = await sha256(findKey); channels[actualSid] = { tempKey: findKey, sessionSecret, status: 'open', isCreator: false, createdAt: Date.now() }; startPolling(actualSid); saveSessions(); sendToParent({ type: 'channel-open', secret: sessionSecret, channelId: actualSid, role: 'receiver' }); log('Подключено!', 'success'); updateUI(); }

    window.addEventListener('message', (event) => {
        let origin; try { origin = new URL(event.origin).hostname; } catch (e) { return; }
        const allowed = ['stepweather-prog.github.io', 'localhost', '127.0.0.1'];
        if (!allowed.some(a => origin.endsWith(a))) return;
        if (event.source !== window.parent) return;
        const data = event.data; if (!data || !data.action) return;
        if (data.action === 'handshake') { if (data.handshake === handshakeSecret) { handshakeSecret = null; sendToParent({ type: 'handshake-ok' }); log('Handshake OK', 'success'); } return; }
        if (data.action === 'send') { const ch = channels[data.channelId]; if (!ch || !ch.sessionSecret) { sendToParent({ type: 'error', text: 'Канал не найден' }); return; } if (data.secret !== ch.sessionSecret) { sendToParent({ type: 'error', text: 'Неверный секрет' }); return; } const packet = JSON.stringify({ text: data.text, sender: NODE_ID, time: Date.now() }); apiCall('POST', '/message', { sessionId: data.channelId, packet }); return; }
        if (data.action === 'server-switch' && data.server && data.server !== currentServer) { switchServer(data.server); return; }
        if (data.action === 'get-status') { sendToParent({ type: 'server-status', server: currentServer, status: serverStatuses[currentServer], channels: Object.keys(channels).length, max: MAX_CH, isPWA: isPWA }); return; }
        switch (data.action) { case 'create': createSession(data.tempKey); break; case 'accept': if (data.id) acceptSession(data.id, data.key || ''); break; case 'cancel-create': log('Создание отменено', 'info'); break; }
    });

    $('card-render').addEventListener('click', () => switchServer('render'));
    $('card-workers').addEventListener('click', () => switchServer('workers'));
    $('btn-refresh').addEventListener('click', checkAllServers);
    document.addEventListener('visibilitychange', () => { if (document.hidden) { Object.keys(pollIntervals).forEach(stopPolling); } else { Object.keys(channels).forEach(sid => { if (channels[sid].status === 'open') startPolling(sid); }); checkAllServers(); } });
    window.addEventListener('beforeunload', () => { if (Object.keys(channels).length > 0) saveSessions(); stopAllPolling(); });

    async function init() { const saved = localStorage.getItem('robinhood_server'); if (saved && (saved === 'render' || saved === 'workers')) currentServer = saved; updateUI(); await checkAllServers(); await restoreSessions(); log('P2PPong v4.0 готов [' + (isRobinCall ? 'Call' : 'P2P') + ']', 'success'); }
    init();
})();
</script>
</body>
</html>
