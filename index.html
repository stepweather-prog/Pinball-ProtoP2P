<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pinball Quick Strike</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #121212; color: #eee; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        button { padding: 10px 16px; margin: 5px; background: #2E7D32; border: none; color: white; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #388E3C; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #1e1e1e; border: 1px solid #444; color: white; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        #chat { border: 1px solid #333; min-height: 200px; max-height: 50vh; overflow-y: auto; padding: 10px; margin: 10px 0; background: #1a1a1a; border-radius: 6px; }
        #status { color: #888; font-size: 0.9em; margin: 5px 0; }
        .link-box { word-break: break-all; background: #1e1e1e; padding: 10px; border: 1px solid #444; border-radius: 6px; margin: 10px 0; font-size: 0.9em; }
    </style>
</head>
<body>
<div class="container">
    <h3>⚡ Быстрая стрела (Matrix‑сигналинг)</h3>
    <div>
        <button id="createBtn">Создать стрелу</button>
        <div id="offerLink" class="link-box" style="display:none;"></div>
    </div>
    <div>
        <button id="acceptBtn" style="display:none;">Принять стрелу</button>
    </div>
    <div id="chat"></div>
    <div>
        <input type="text" id="messageInput" placeholder="Введи сообщение после соединения" disabled>
        <button id="sendBtn" disabled>Отправить</button>
    </div>
    <div id="status">Ожидание действий...</div>
</div>

<script>
const MATRIX_HOMESERVER = 'https://tchncs.de';
const statusDiv = document.getElementById('status');
const chatDiv = document.getElementById('chat');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const createBtn = document.getElementById('createBtn');
const acceptBtn = document.getElementById('acceptBtn');
const offerLink = document.getElementById('offerLink');

let peerConnection;
let dataChannel;
let sessionId;  // теперь это room_id Matrix
let accessToken;
let userId;
let syncInterval;

// ---------- Matrix-помощники ----------
async function matrixRegister() {
    const username = 'pinball_' + Math.random().toString(36).substring(2, 10);
    const password = Math.random().toString(36).substring(2, 14);
    const res = await fetch(`${MATRIX_HOMESERVER}/_matrix/client/v3/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            username,
            password,
            auth: { type: 'm.login.dummy' }
        })
    });
    if (!res.ok) { statusDiv.textContent = 'Ошибка регистрации в Matrix'; return null; }
    const data = await res.json();
    accessToken = data.access_token;
    userId = data.user_id;
    return true;
}

async function matrixCreateRoom() {
    const res = await fetch(`${MATRIX_HOMESERVER}/_matrix/client/v3/createRoom`, {
        method: 'POST',
        headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            room_alias_name: `pinball_${Date.now()}`,
            name: 'Pinball Strike',
            preset: 'public_chat'
        })
    });
    if (!res.ok) { statusDiv.textContent = 'Ошибка создания комнаты'; return null; }
    const data = await res.json();
    return data.room_id;
}

async function matrixSendMessage(roomId, msgType, body) {
    const txnId = Date.now() + Math.random().toString(36);
    await fetch(`${MATRIX_HOMESERVER}/_matrix/client/v3/rooms/${roomId}/send/${msgType}/${txnId}`, {
        method: 'PUT',
        headers: {
            'Authorization': `Bearer ${accessToken}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
    });
}

function matrixStartSync(roomId, onMessage) {
    let since = '';
    syncInterval = setInterval(async () => {
        try {
            const url = `${MATRIX_HOMESERVER}/_matrix/client/v3/sync?timeout=30000&since=${since}`;
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            since = data.next_batch;
            const room = data.rooms?.join?.[roomId];
            if (!room) return;
            const events = room.timeline?.events || [];
            for (const ev of events) {
                if (ev.type === 'm.room.message' && ev.sender !== userId) {
                    onMessage(ev.content.body);
                }
            }
        } catch(e) {}
    }, 2000);
}

// ---------- WebRTC (без изменений) ----------
async function createOffer() {
    createBtn.disabled = true;
    // регистрируемся и создаём комнату
    if (!await matrixRegister()) return;
    const roomId = await matrixCreateRoom();
    if (!roomId) return;
    sessionId = roomId;

    peerConnection = new RTCPeerConnection();
    dataChannel = peerConnection.createDataChannel('chat');
    setupDataChannel(dataChannel);

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    // отправляем SDP в комнату
    await matrixSendMessage(roomId, 'm.room.message', {
        msgtype: 'm.text',
        body: JSON.stringify({ type: 'offer', sdp: peerConnection.localDescription })
    });

    // слушаем ответ
    matrixStartSync(roomId, async (msg) => {
        try {
            const data = JSON.parse(msg);
            if (data.type === 'answer' && !peerConnection.currentRemoteDescription) {
                await peerConnection.setRemoteDescription(data.sdp);
                statusDiv.textContent = '✅ Соединение установлено!';
            } else if (data.type === 'ice') {
                try { await peerConnection.addIceCandidate(data.candidate); } catch(e) {}
            }
        } catch(e) {}
    });

    const link = window.location.href + '?room=' + encodeURIComponent(roomId);
    offerLink.style.display = 'block';
    offerLink.innerHTML = `<strong>Отправь эту ссылку другу:</strong><br>${link}`;
    statusDiv.textContent = 'Ожидание ответа...';
}

async function acceptOffer() {
    const params = new URLSearchParams(window.location.search);
    const roomId = params.get('room');
    if (!roomId) return;
    acceptBtn.style.display = 'none';
    sessionId = roomId;

    if (!await matrixRegister()) return;
    // вступаем в комнату (приглашения не нужно, потому что комната public)
    await fetch(`${MATRIX_HOMESERVER}/_matrix/client/v3/rooms/${roomId}/join`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${accessToken}` }
    });

    peerConnection = new RTCPeerConnection();
    peerConnection.ondatachannel = (e) => {
        dataChannel = e.channel;
        setupDataChannel(dataChannel);
    };

    matrixStartSync(roomId, async (msg) => {
        try {
            const data = JSON.parse(msg);
            if (data.type === 'offer') {
                await peerConnection.setRemoteDescription(data.sdp);
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await matrixSendMessage(roomId, 'm.room.message', {
                    msgtype: 'm.text',
                    body: JSON.stringify({ type: 'answer', sdp: peerConnection.localDescription })
                });
            } else if (data.type === 'ice') {
                try { await peerConnection.addIceCandidate(data.candidate); } catch(e) {}
            }
        } catch(e) {}
    });

    statusDiv.textContent = 'Ответ отправлен. Устанавливаем соединение...';
}

function setupDataChannel(channel) {
    channel.onopen = () => {
        statusDiv.textContent = '✅ Канал открыт! Можно общаться.';
        messageInput.disabled = false;
        sendBtn.disabled = false;
    };
    channel.onmessage = (e) => {
        const msg = document.createElement('div');
        msg.textContent = `📩 Друг: ${e.data}`;
        chatDiv.appendChild(msg);
    };
}

function sendMessage() {
    if (dataChannel && dataChannel.readyState === 'open') {
        const text = messageInput.value.trim();
        if (text) {
            dataChannel.send(text);
            const msg = document.createElement('div');
            msg.textContent = `📤 Я: ${text}`;
            chatDiv.appendChild(msg);
            messageInput.value = '';
        }
    }
}

createBtn.addEventListener('click', createOffer);
sendBtn.addEventListener('click', sendMessage);

if (window.location.search.includes('room=')) {
    acceptBtn.style.display = 'block';
    statusDiv.textContent = 'Нажми "Принять стрелу" для подключения.';
    acceptBtn.addEventListener('click', acceptOffer);
}
</script>
</body>
</html>
